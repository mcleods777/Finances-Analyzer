pay_period:
  start_date: '2025-01-06'
  frequency_days: 14

accounts:
- file: Checking.csv
  name: Main Checking
  type: checking
  columns:
    date: Posting Date
    description: Description
    amount: Amount
    debit: null
    credit: null
  date_format: '%m/%d/%Y'
  amount_sign: standard
  balance_column: Balance
  opening_balance: null
  opening_date: null

classification:
  income_keywords:
  - direct deposit
  - payroll
  - salary
  expense_keywords:
  - paypal
  transfer_keywords:
  - transfer
  - xfer

categorization_rules:
- category: Groceries
  keywords:
  - walmart
  - target
- category: Dining Out
  keywords:
  - mcdonald's
  - subway

recurring_bills:
- name: Example Bill
  amount: 100.00
  day_of_month: 1
  match_criteria:
  - example bill

temporary_expenses: []
budget_overrides:
  first_half: null
  second_half: null

# Optional: attribute paychecks that post in the last few days of a month
# to the FOLLOWING month's income (biweekly pay often lands a few days
# early against the calendar). paycheck_shift_days: 0 (or omitting this
# block) disables the feature — all income counts toward its literal
# posting month.
income_attribution:
  paycheck_shift_days: 0
  paycheck_keywords:
  - payroll
  - direct deposit
  - salary

# AI briefing (pattern detectors + daily LLM briefing). All keys optional;
# omitting the whole block uses these defaults.
briefing:
  model: claude-haiku-4-5   # one of: claude-haiku-4-5, claude-sonnet-4-6, claude-opus-4-7
  max_per_day: 20           # cost-amp guard: per-day LLM call cap before short-circuit to cache
  enabled: true             # if false, briefing degrades to templated pattern headlines

# Conversational CFO — The Desk (/desk chat). All keys optional; omitting the
# whole block uses these defaults. Requires ANTHROPIC_API_KEY in .env.
advisor:
  default_model: claude-sonnet-5   # one of: claude-haiku-4-5, claude-sonnet-5, claude-opus-4-8
  max_per_day: 100                 # cost-amp guard: per-day advisor API-call cap (its own counter)
  max_loop_iterations: 8           # agentic tool-loop cap per question
  enabled: true                    # if false, /api/chat returns a setup hint instead of calling the API
