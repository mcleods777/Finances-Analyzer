<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finance Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
    <style>
        /* Masthead nav — quiet text links over a scotch rule */
        .main-nav {
            display: flex;
            align-items: baseline;
            gap: 4px;
            padding: 12px 0 10px;
            background: transparent;
            border-bottom: 1px solid var(--rule);
            position: relative;
            margin-bottom: 24px;
        }

        .main-nav::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -4px;
            border-bottom: 1px solid var(--rule);
        }

        .main-nav .nav-brand {
            font-family: var(--serif);
            font-variant: small-caps;
            letter-spacing: 0.04em;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            margin-right: 24px;
            font-size: 1.2rem;
        }

        .main-nav a.nav-link {
            text-decoration: none;
            color: var(--muted);
            padding: 6px 10px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .main-nav a.nav-link:hover {
            color: var(--text);
        }

        .main-nav a.nav-link.active {
            color: var(--brass);
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="main-nav">
        <a href="/" class="nav-brand">Finance Tracker</a>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/transactions" class="nav-link {% if request.path == '/transactions' %}active{% endif %}">Transactions</a>
        <a href="/accounts" class="nav-link {% if request.path == '/accounts' %}active{% endif %}">Accounts</a>
        <a href="/forecast" class="nav-link {% if request.path == '/forecast' %}active{% endif %}">Forecast</a>
        <a href="/categories" class="nav-link {% if request.path == '/categories' %}active{% endif %}">Categories</a>
        <a href="/rules" class="nav-link {% if request.path == '/rules' %}active{% endif %}">Rules</a>
    </nav>
    {% block content %}{% endblock %}
</body>

</html>
