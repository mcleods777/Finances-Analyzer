{% extends "base.html" %}

{% block title %}Forecast - Personal Finance Dashboard{% endblock %}

{% block head %}
    <style>
        .forecast-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .forecast-placeholder {
            background: #1e293b;
            border: 1px dashed #334155;
            border-radius: 12px;
            padding: 60px 24px;
            text-align: center;
            color: #94a3b8;
        }

        .forecast-placeholder h2 {
            color: #e2e8f0;
            margin-bottom: 8px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="forecast-container">
        <h1>Cash-Flow Forecast</h1>
        <div class="forecast-placeholder" style="margin-top: 16px;">
            <h2>Coming soon</h2>
            <p>A calendar view projecting your balances forward from recurring bills and income.</p>
        </div>
    </div>
{% endblock %}
